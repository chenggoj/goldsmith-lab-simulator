<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Goldsmith Lab Simulator — UMich ChemE</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #000;
    }

    #ui {
      position: absolute;
      top: 16px;
      left: 16px;
      color: #fff;
      background: rgba(0, 39, 76, 0.88);
      padding: 14px 18px;
      border-radius: 12px;
      backdrop-filter: blur(10px);
      max-width: 265px;
      border: 1px solid #ffcb0544;
    }

    #ui h2 {
      margin: 0 0 2px;
      font-size: 15px;
      color: #ffcb05;
    }

    #ui p {
      margin: 3px 0;
      font-size: 12px;
      opacity: .85;
    }

    #ui .tip {
      margin-top: 8px;
      font-size: 11px;
      color: #ffcb05;
    }

    #dbox {
      position: absolute;
      bottom: 18px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255, 255, 255, .97);
      color: #222;
      padding: 20px 22px;
      border-radius: 16px;
      max-width: 640px;
      width: 92%;
      display: none;
      box-shadow: 0 12px 40px rgba(0, 0, 0, .35);
      border-top: 4px solid #00274c;
    }

    #dbox h3 {
      margin: 0 0 8px;
      color: #00274c;
      font-size: 15px;
    }

    #dcont {
      margin: 8px 0;
      line-height: 1.6;
      max-height: 175px;
      overflow-y: auto;
      font-size: 13px;
    }

    .opt {
      background: #f4f4f4;
      border: 2px solid #00274c;
      padding: 10px 14px;
      margin: 6px 0;
      border-radius: 8px;
      cursor: pointer;
      font-size: 12.5px;
      transition: all .2s;
    }

    .opt:hover {
      background: #00274c;
      color: #ffcb05;
      transform: translateX(4px);
    }

    #cqw {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid #ddd;
    }

    #cqw p {
      margin: 0 0 6px;
      font-size: 11px;
      text-align: center;
      color: #666;
    }

    #cqi {
      width: 100%;
      padding: 9px 12px;
      border: 2px solid #00274c;
      border-radius: 8px;
      font-size: 13px;
      font-family: inherit;
    }

    #cqb {
      background: #00274c;
      color: #ffcb05;
      border: none;
      padding: 9px 18px;
      border-radius: 8px;
      margin-top: 6px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      transition: all .2s;
    }

    #cqb:hover {
      background: #ffcb05;
      color: #00274c;
    }

    #cqb:disabled {
      background: #999;
      color: #fff;
      cursor: not-allowed;
    }

    .spin {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid #ccc;
      border-top-color: #00274c;
      border-radius: 50%;
      animation: sp .8s linear infinite;
    }

    @keyframes sp {
      to {
        transform: rotate(360deg);
      }
    }

    #ipr {
      position: absolute;
      bottom: 170px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 39, 76, .88);
      color: #ffcb05;
      padding: 8px 20px;
      border-radius: 20px;
      display: none;
      font-size: 13px;
      font-weight: 600;
      pointer-events: none;
    }

    .ft {
      position: absolute;
      font-size: 20px;
      font-weight: bold;
      pointer-events: none;
      animation: fu 2s ease-out forwards;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, .7);
    }

    @keyframes fu {
      0% {
        opacity: 1;
        transform: translateY(0)
      }

      100% {
        opacity: 0;
        transform: translateY(-90px)
      }
    }

    /* ── NPC Speech Bubbles ── */
    .speech-bubble {
      position: absolute;
      background: rgba(0, 39, 76, 0.92);
      color: #fff;
      padding: 8px 14px;
      border-radius: 12px;
      font-size: 12px;
      max-width: 260px;
      line-height: 1.4;
      pointer-events: none;
      backdrop-filter: blur(6px);
      border: 1px solid rgba(255, 203, 5, 0.3);
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.4);
      animation: bubbleIn 0.3s ease-out;
      z-index: 50;
      transform: translateX(-50%);
    }

    .speech-bubble::after {
      content: '';
      position: absolute;
      bottom: -8px;
      left: 50%;
      transform: translateX(-50%);
      border-left: 8px solid transparent;
      border-right: 8px solid transparent;
      border-top: 8px solid rgba(0, 39, 76, 0.92);
    }

    .speech-bubble .sb-name {
      color: #ffcb05;
      font-weight: 700;
      font-size: 11px;
      margin-bottom: 2px;
    }

    .speech-bubble .sb-text {
      opacity: 0.95;
    }

    @keyframes bubbleIn {
      0% {
        opacity: 0;
        transform: translateX(-50%) translateY(10px) scale(0.8);
      }

      100% {
        opacity: 1;
        transform: translateX(-50%) translateY(0) scale(1);
      }
    }

    @keyframes bubbleOut {
      0% {
        opacity: 1;
        transform: translateX(-50%) translateY(0) scale(1);
      }

      100% {
        opacity: 0;
        transform: translateX(-50%) translateY(-10px) scale(0.8);
      }
    }

    /* Self-talk / mumble bubble — smaller, more translucent */
    .mumble-bubble {
      position: absolute;
      background: rgba(40, 40, 60, 0.75);
      color: rgba(255, 255, 255, 0.8);
      padding: 5px 10px;
      border-radius: 10px;
      font-size: 11px;
      font-style: italic;
      max-width: 200px;
      pointer-events: none;
      animation: bubbleIn 0.3s ease-out;
      z-index: 49;
      transform: translateX(-50%);
    }

    .mumble-bubble::after {
      content: '';
      position: absolute;
      bottom: -6px;
      left: 50%;
      transform: translateX(-50%);
      border-left: 6px solid transparent;
      border-right: 6px solid transparent;
      border-top: 6px solid rgba(40, 40, 60, 0.75);
    }
  </style>
</head>

<body>
  <div id="ui">
    <h2>Goldsmith Lab · UMich ChemE</h2>
    <p>Computational Catalysis &amp; Data Science</p>
    <p style="margin-top:8px">WASD — move</p>
    <p>&larr; &rarr; / mouse — look</p>
    <p>E — talk to labmates</p>
    <p>SPACE — celebrate convergence</p>
    <p>ESC — close dialog</p>
    <p class="tip">&gt; Type your own questions!</p>
  </div>
  <div id="dbox">
    <h3 id="dname">Name</h3>
    <div id="dcont"></div>
    <div id="dopts"></div>
    <div id="cqw">
      <p>--- Or interrogate them yourself ---</p>
      <input id="cqi" type="text" maxlength="200"
        placeholder="e.g. 'Is your DFT converged?' or 'What is the limiting potential of your mood?'">
      <button id="cqb">Ask</button>
    </div>
  </div>
  <div id="ipr"></div>
  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
  <script>
    // ── Scene ──────────────────────────────────────────────────────────────────
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xeef0f5);
    scene.fog = new THREE.Fog(0xeef0f5, 14, 62);
    const camera = new THREE.PerspectiveCamera(72, innerWidth / innerHeight, 0.1, 200);
    camera.position.set(0, 1.6, 12);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(innerWidth, innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    THREE.ColorManagement.enabled = false;
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);
    scene.add(new THREE.AmbientLight(0xffffff, 0.55));
    const sun = new THREE.DirectionalLight(0xfff8e7, 0.9);
    sun.position.set(8, 18, 10); sun.castShadow = true;
    sun.shadow.camera.left = sun.shadow.camera.bottom = -38;
    sun.shadow.camera.right = sun.shadow.camera.top = 38;
    sun.shadow.mapSize.width = sun.shadow.mapSize.height = 2048;
    scene.add(sun);

    // ── Helpers ────────────────────────────────────────────────────────────────
    const M = (geo, mat, x = 0, y = 0, z = 0, rx = 0, ry = 0) => {
      const m = new THREE.Mesh(geo, mat);
      m.position.set(x, y, z); m.rotation.x = rx; m.rotation.y = ry;
      m.castShadow = m.receiveShadow = true; return m;
    };
    const _matCache = {};
    const C = h => _matCache[h] || (_matCache[h] = new THREE.MeshStandardMaterial({ color: h }));
    const mat = {
      floor: C(0xd8dce5), tile: C(0xf8f8f8), tile2: C(0xe8ecf3),
      wall: C(0xfafcfe),
      desk: new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: .3, metalness: .1 }),
      metal: new THREE.MeshStandardMaterial({ color: 0x8898aa, roughness: .3, metalness: .8 }),
      screen: new THREE.MeshStandardMaterial({ color: 0x0a1628, roughness: .1, metalness: .3 }),
      navy: C(0x00274c), maize: C(0xffcb05), white: C(0xffffff), skin: C(0xffdbac),
      wood: new THREE.MeshStandardMaterial({ color: 0xb07828, roughness: .7 }),
      conf: C(0x2a4a6a),
      srv: new THREE.MeshStandardMaterial({ color: 0x2a3040, roughness: .3, metalness: .6 }),
    };

    // ── Floor ──────────────────────────────────────────────────────────────────
    scene.add(M(new THREE.PlaneGeometry(56, 56), mat.floor, 0, 0, 0, -Math.PI / 2));
    (function () {
      const fc = document.createElement('canvas'); fc.width = fc.height = 128;
      const ctx = fc.getContext('2d');
      ctx.fillStyle = '#f8f8f8'; ctx.fillRect(0, 0, 64, 64); ctx.fillRect(64, 64, 64, 64);
      ctx.fillStyle = '#e8ecf3'; ctx.fillRect(64, 0, 64, 64); ctx.fillRect(0, 64, 64, 64);
      const floorTex = new THREE.CanvasTexture(fc);
      floorTex.wrapS = floorTex.wrapT = THREE.RepeatWrapping;
      floorTex.repeat.set(13, 13);
      scene.add(M(new THREE.PlaneGeometry(52, 52),
        new THREE.MeshStandardMaterial({ map: floorTex, roughness: 0.85 }),
        0, .005, 0, -Math.PI / 2));
    })();

    // ── Walls & windows ────────────────────────────────────────────────────────
    [[0, 5, -25, 56, 10, 0], [0, 5, 25, 56, 10, Math.PI], [-25, 5, 0, 56, 10, Math.PI / 2], [25, 5, 0, 56, 10, -Math.PI / 2]].forEach(([x, y, z, w, h, ry]) =>
      scene.add(M(new THREE.BoxGeometry(w, h, .15), mat.wall, x, y, z, 0, ry)));
    const winMat = new THREE.MeshStandardMaterial({ color: 0x88ccff, transparent: true, opacity: .25, roughness: .05 });
    [-18, -8, 2, 12].forEach(x => scene.add(M(new THREE.BoxGeometry(4, 2.5, .08), winMat, x, 5.5, -24.9)));

    // ── Michigan M ──────────────────────────────────────────────────────────────
    [-1.2, -.4, .4, 1.2].forEach(x => scene.add(M(new THREE.BoxGeometry(.32, 2.2, .07), mat.maize, x, 5.5, -24.86)));
    const dl = M(new THREE.BoxGeometry(.32, 1.4, .07), mat.maize, -.72, 4.5, -24.86); dl.rotation.z = .44; scene.add(dl);
    const dr = M(new THREE.BoxGeometry(.32, 1.4, .07), mat.maize, .72, 4.5, -24.86); dr.rotation.z = -.44; scene.add(dr);

    // ── Whiteboard ─────────────────────────────────────────────────────────────
    scene.add(M(new THREE.BoxGeometry(7, 3, .07), mat.white, 0, 5, -24.82));
    (function () {
      const wc = document.createElement('canvas'); wc.width = 700; wc.height = 300;
      const wx = wc.getContext('2d');
      wx.fillStyle = '#fff'; wx.fillRect(0, 0, 700, 300);
      wx.fillStyle = '#00274c'; wx.font = 'bold 20px monospace';
      wx.fillText('dG < 0: Nature agrees.     dG > 0: Check your functional.', 14, 36);
      wx.fillStyle = '#1a6a1a'; wx.font = 'italic 17px monospace';
      wx.fillText('"It\'s converged." -- last words of many VASP jobs', 14, 70);
      wx.fillStyle = '#aa2222'; wx.font = 'bold 16px sans-serif';
      wx.fillText('[!] No error bars = no publication.  (Goldsmith\'s First Law)', 14, 102);
      wx.fillStyle = '#333'; wx.font = '15px monospace';
      wx.fillText('DFT = Daring Fictional Thermodynamics  (use PBE+U and pray)', 14, 132);
      wx.fillStyle = '#5a2a8a'; wx.font = '15px monospace';
      wx.fillText('Volcano peak: where ALL theorists claim their catalyst lives.', 14, 162);
      wx.fillStyle = '#333'; wx.font = '14px sans-serif';
      wx.fillText('If DFT != experiment: blame DFT, then experiment, then yourself.', 14, 190);
      wx.fillStyle = '#555'; wx.font = '14px sans-serif';
      wx.fillText('Group mtg Fri 2pm -- volcano plots MANDATORY. No exceptions.', 14, 218);
      wx.fillStyle = '#007070'; wx.font = '13px sans-serif';
      wx.fillText('More k-points. Always more k-points.  -- Sun Tzu, probably', 14, 246);
      wx.fillStyle = '#888'; wx.font = '12px sans-serif';
      wx.fillText('Coffee machine alive (for now). Cameron added error bars to the beans.', 14, 275);
      scene.add(M(new THREE.PlaneGeometry(6.9, 2.9),
        new THREE.MeshStandardMaterial({ map: new THREE.CanvasTexture(wc) }), 0, 5, -24.75));
    })();

    // ── Workstations ───────────────────────────────────────────────────────────
    (function () {
      const wsPos = [
        [-18, -20], [-9, -20], [0, -20], [9, -20], [18, -20],
        [-18, -13], [-9, -13], [9, -13], [18, -13],
        [-18, -6], [18, -6], [-18, 2], [18, 2],
        [-18, 10], [18, 10], [-9, 17], [9, 17]
      ];
      const n = wsPos.length;
      const dummy = new THREE.Object3D();
      dummy.rotation.set(0, 0, 0); dummy.scale.setScalar(1);
      const IM = (geo, m, count) => {
        const im = new THREE.InstancedMesh(geo, m, count);
        im.castShadow = im.receiveShadow = true; return im;
      };
      const imDesk = IM(new THREE.BoxGeometry(2, .07, 1), mat.desk, n);
      const imLeg = IM(new THREE.BoxGeometry(.055, .8, .055), mat.metal, n * 4);
      const imMonBase = IM(new THREE.CylinderGeometry(.07, .07, .04, 8), mat.metal, n * 2);
      const imMonPole = IM(new THREE.BoxGeometry(.03, .2, .03), mat.metal, n * 2);
      const imScreen = IM(new THREE.BoxGeometry(.62, .38, .03), mat.screen, n * 2);
      const imKbd = IM(new THREE.BoxGeometry(.43, .02, .15), mat.metal, n);
      const towerMat = C(0x1a2a3a);
      const imTowerBody = IM(new THREE.BoxGeometry(.44, .05, .44), towerMat, n);
      const imTowerFront = IM(new THREE.BoxGeometry(.44, .48, .05), towerMat, n);
      const cupMask = wsPos.map(() => Math.random() > .3);
      const nCups = cupMask.filter(Boolean).length;
      const imCup = nCups ? IM(new THREE.CylinderGeometry(.055, .055, .1, 8), mat.maize, nCups) : null;
      const legOff = [[-0.94, .4, -.44], [0.94, .4, -.44], [-0.94, .4, .44], [0.94, .4, .44]];
      let legI = 0, monI = 0, cupI = 0;
      wsPos.forEach(([wx, wz], i) => {
        dummy.position.set(wx, .8, wz); dummy.updateMatrix(); imDesk.setMatrixAt(i, dummy.matrix);
        legOff.forEach(([lx, ly, lz]) => {
          dummy.position.set(wx + lx, ly, wz + lz); dummy.updateMatrix(); imLeg.setMatrixAt(legI++, dummy.matrix);
        });
        [-.48, .48].forEach(mx => {
          dummy.position.set(wx + mx, .84, wz); dummy.updateMatrix(); imMonBase.setMatrixAt(monI, dummy.matrix);
          dummy.position.set(wx + mx, .96, wz); dummy.updateMatrix(); imMonPole.setMatrixAt(monI, dummy.matrix);
          dummy.position.set(wx + mx, 1.17, wz); dummy.updateMatrix(); imScreen.setMatrixAt(monI++, dummy.matrix);
        });
        dummy.position.set(wx, .82, wz + .25); dummy.updateMatrix(); imKbd.setMatrixAt(i, dummy.matrix);
        dummy.position.set(wx, .5, wz + .7); dummy.updateMatrix(); imTowerBody.setMatrixAt(i, dummy.matrix);
        dummy.position.set(wx, .76, wz + .92); dummy.updateMatrix(); imTowerFront.setMatrixAt(i, dummy.matrix);
        if (cupMask[i] && imCup) { dummy.position.set(wx + .82, .85, wz + .28); dummy.updateMatrix(); imCup.setMatrixAt(cupI++, dummy.matrix); }
      });
      [imDesk, imLeg, imMonBase, imMonPole, imScreen, imKbd, imTowerBody, imTowerFront].forEach(im => {
        im.instanceMatrix.needsUpdate = true; scene.add(im);
      });
      if (imCup) { imCup.instanceMatrix.needsUpdate = true; scene.add(imCup); }
    })();

    // ── Conference table ────────────────────────────────────────────────────────
    (function () {
      scene.add(M(new THREE.BoxGeometry(6, .1, 2.5), mat.conf, 0, .75, 6));
      const dummy = new THREE.Object3D();
      dummy.rotation.set(0, 0, 0); dummy.scale.setScalar(1);
      const chairMat = C(0x3a4a5a);
      const imSeat = new THREE.InstancedMesh(new THREE.BoxGeometry(.43, .05, .43), chairMat, 10);
      const imBack = new THREE.InstancedMesh(new THREE.BoxGeometry(.43, .44, .05), chairMat, 10);
      imSeat.castShadow = imBack.castShadow = true;
      let ci = 0;
      [.55, -.55].forEach(z => {
        [-2.1, -1.05, 0, 1.05, 2.1].forEach(cx => {
          dummy.position.set(cx, .37, 6 + z); dummy.updateMatrix(); imSeat.setMatrixAt(ci, dummy.matrix);
          dummy.position.set(cx, .7, 6 + z + (z > 0 ? .24 : -.24)); dummy.updateMatrix(); imBack.setMatrixAt(ci++, dummy.matrix);
        });
      });
      imSeat.instanceMatrix.needsUpdate = true; imBack.instanceMatrix.needsUpdate = true;
      scene.add(imSeat, imBack);
    })();

    // ── Server racks ───────────────────────────────────────────────────────────
    const blinkLights = [];
    [21, 22.6].forEach((x, i) => {
      const sg = new THREE.Group(); sg.position.set(x, 0, -16 + i * 5);
      sg.add(M(new THREE.BoxGeometry(1.2, 2.2, .8), mat.srv, 0, 1.1, 0));
      for (let r = 0; r < 8; r++) sg.add(M(new THREE.BoxGeometry(1, .065, .68), mat.navy, 0, .3 + r * .24, .01));
      for (let b = 0; b < 5; b++) {
        const bl = M(new THREE.SphereGeometry(.033),
          new THREE.MeshStandardMaterial({ color: 0x00ff88, emissive: 0x00ff88, emissiveIntensity: 1 }),
          -.28 + b * .14, 1.2, .41);
        blinkLights.push(bl); sg.add(bl);
      }
      scene.add(sg);
    });

    // ── Bookshelves ─────────────────────────────────────────────────────────────
    [-16, -5].forEach(z => {
      const bg = new THREE.Group(); bg.position.set(-24.6, 0, z);
      bg.add(M(new THREE.BoxGeometry(.28, 2.4, 3), new THREE.MeshStandardMaterial({ color: 0xb07828, roughness: .7 }), 0, 1.2, 0));
      for (let s = 0; s < 4; s++) bg.add(M(new THREE.BoxGeometry(.22, .05, 2.75), mat.metal, 0, .5 + s * .58, 0));
      [0x8b0000, 0x00274c, 0x1a6a1a, 0x4a2a8a, 0xcc6600, 0x2a4a6a, 0x6a1a1a, 0x2a6a4a].forEach((c, b) =>
        bg.add(M(new THREE.BoxGeometry(.2, .33, .28), C(c), 0, .65 + Math.floor(b / 4) * .58, -1.15 + b * .3)));
      scene.add(bg);
    });

    // ── Plants & coffee ─────────────────────────────────────────────────────────
    (function () {
      const plantPos = [[-22, 22], [22, 22], [0, 23], [-22, -23], [22, -23]];
      const dummy = new THREE.Object3D();
      dummy.rotation.set(0, 0, 0); dummy.scale.setScalar(1);
      const imPot = new THREE.InstancedMesh(new THREE.CylinderGeometry(.2, .17, .3, 6), C(0x7a4010), 5);
      const imLeaf = new THREE.InstancedMesh(new THREE.SphereGeometry(.42, 6), C(0x228830), 5);
      imPot.castShadow = imPot.receiveShadow = true;
      imLeaf.castShadow = imLeaf.receiveShadow = true;
      plantPos.forEach(([x, z], i) => {
        dummy.position.set(x, .15, z); dummy.updateMatrix(); imPot.setMatrixAt(i, dummy.matrix);
        dummy.position.set(x, .68, z); dummy.updateMatrix(); imLeaf.setMatrixAt(i, dummy.matrix);
      });
      imPot.instanceMatrix.needsUpdate = true; imLeaf.instanceMatrix.needsUpdate = true;
      scene.add(imPot, imLeaf);
    })();
    const cst = new THREE.Group(); cst.position.set(21.5, 0, 12);
    cst.add(M(new THREE.BoxGeometry(1.6, .72, .85), mat.wood, 0, .36, 0));
    cst.add(M(new THREE.BoxGeometry(.36, .42, .28), mat.metal, 0, .78, 0));
    cst.add(M(new THREE.CylinderGeometry(.055, .055, .1, 8), mat.maize, .48, .76, .18));
    scene.add(cst);

    // ── Wall Posters ───────────────────────────────────────────────────────────
    (function () {
      const POSTER_W = 3.4, POSTER_H = 2.4;
      const CW = 1024, CH = 720;

      function addPoster(drawFn, x, y, z, ry) {
        const pc = document.createElement('canvas'); pc.width = CW; pc.height = CH;
        drawFn(pc.getContext('2d'), CW, CH);
        // MeshBasicMaterial: no lighting dependency, canvas texture always fully visible
        const pMat = new THREE.MeshBasicMaterial({ map: new THREE.CanvasTexture(pc), side: THREE.DoubleSide });
        const frameMat = new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: .7 });
        // Offset poster along its outward normal to render in front of frame box
        // Normal after rotation ry: (-sin(ry), 0, cos(ry))
        const fwd = 0.035;
        const dx = Math.sin(ry) * fwd;
        const dz = Math.cos(ry) * fwd;
        const frame = M(new THREE.BoxGeometry(POSTER_W + .14, POSTER_H + .14, .04), frameMat, x, y, z, 0, ry);
        const poster = M(new THREE.PlaneGeometry(POSTER_W, POSTER_H), pMat, x + dx, y, z + dz, 0, ry);
        scene.add(frame); scene.add(poster);
      }

      function drawHeader(ctx, w, title, subtitle, bgColor, textColor) {
        ctx.fillStyle = bgColor || '#00274c';
        ctx.fillRect(0, 0, w, 118);
        ctx.fillStyle = textColor || '#ffcb05';
        ctx.font = 'bold 42px Arial'; ctx.textAlign = 'center';
        ctx.fillText(title, w / 2, 66);
        if (subtitle) {
          ctx.fillStyle = 'rgba(255,255,255,0.75)'; ctx.font = '22px Arial';
          ctx.fillText(subtitle, w / 2, 100);

        if (keys['ArrowUp']) { mouseY += .03; mouseY = Math.min(Math.PI / 2 - 0.05, mouseY); }
        if (keys['ArrowDown']) { mouseY -= .03; mouseY = Math.max(-Math.PI / 2 + 0.05, mouseY); }
      }
      player.pos.x = Math.max(-23, Math.min(23, player.pos.x));
      player.pos.z = Math.max(-23, Math.min(23, player.pos.z));
      camera.position.copy(player.pos);
      if (player.dancing) { camera.position.y = player.pos.y + Math.sin(now * .01) * .2; camera.rotation.z = Math.sin(now * .012) * .08; }
      else { camera.rotation.z = 0; }
      if (dBox.style.display !== 'block') {
        camera.rotation.order = 'YXZ';
        camera.rotation.y = mouseX;
        camera.rotation.x = mouseY;
      }

      // Character animation
      chars.forEach(ch => {
        const ud = ch.userData;

        // Random stumble/panic event
        if (Math.random() < ud.tc && !ud.dancing && ch !== curChar) {
          ch.rotation.x = .58; ch.position.y = .18;
          floatTxt(['SEGFAULT', 'NaN', 'inf loop', 'OOM', '404', 'ENCUT?'][Math.floor(Math.random() * 6)], ch.position);
          ud.tc = 0;
          setTimeout(() => { ch.rotation.x = 0; ch.position.y = 0; ud.tc = .0007; }, 1200);
        }

        // Face player when in dialogue
        if (ch === curChar) {
          _lookTarget.set(player.pos.x, ch.position.y, player.pos.z);
          ch.lookAt(_lookTarget);
          ch.rotation.x = ch.rotation.z = 0;
          ud.lA.rotation.z = Math.PI / 8 + Math.sin(now * .004) * 0.08;
          ud.rA.rotation.z = -Math.PI / 8 - Math.sin(now * .004 + 1) * 0.08;
          return;
        }

        // Skip idle state machine if in NPC conversation
        if (ud.inConvo) {
          // Keep facing conversation partner — handled by tickNpcChat
          return;
        }

        // Random dance trigger
        if (Math.random() < .0005 && !ud.dancing) {
          ud.dancing = true;
          floatTxt(['DFT!', 'p<0.05', 'R2=1!', 'UQ!', 'SCF ok!', 'dG<0!'][Math.floor(Math.random() * 6)], ch.position);
          setTimeout(() => { ud.dancing = false; }, 3500);

        if (ud.dancing) {
          ch.rotation.y += .11;

          ud.rA.rotation.z = -Math.sin(now * .01) * .52 - Math.PI / 8;
          return;
        }

        // Idle animation state machine
        ud.idleTimer -= dt;
        if (ud.idleTimer <= 0) {
          const r = Math.random();
          if (r < 0.30) { ud.idleAnim = 'typing'; ud.idleTimer = 3 + Math.random() * 5; }
          else if (r < 0.44) { ud.idleAnim = 'thinking'; ud.idleTimer = 2 + Math.random() * 3; }
          else if (r < 0.52) { ud.idleAnim = 'coffee'; ud.idleTimer = 1.5 + Math.random() * 2; }
          else { ud.idleAnim = 'walk'; ud.idleTimer = 3 + Math.random() * 6; }
        }

        // Apply idle pose
        if (ud.idleAnim === 'typing') {
          ch.rotation.x = 0.07;
          ch.position.y = Math.sin(now * 0.003) * 0.006;
          ud.lA.rotation.z = Math.PI / 8 + 0.1 + Math.sin(now * 0.016) * 0.12;

          ud.lA.rotation.x = 0.12; ud.rA.rotation.x = 0.12;
        } else if (ud.idleAnim === 'thinking') {
          ch.rotation.x = 0;
          ch.position.y = 0;
          ud.lA.rotation.z = Math.PI / 8 + 0.55 + Math.sin(now * 0.006) * 0.04;
          ud.rA.rotation.z = -Math.PI / 8;
          ud.lA.rotation.x = -0.1; ud.rA.rotation.x = 0;
        } else if (ud.idleAnim === 'coffee') {
          ch.rotation.x = 0;

          const lift = Math.max(0, Math.sin(now * 0.007)) * 0.7;
          ud.rA.rotation.z = -Math.PI / 8 - lift;

          ud.lA.rotation.x = 0; ud.rA.rotation.x = 0;
        } else if (ud.idleAnim === 'chatting') {

          ch.rotation.x = 0;

          const gesturePhase = Math.sin(now * 0.004);

          ud.lA.rotation.x = -0.15; ud.rA.rotation.x = -0.15;

        } else {
          // walk — reset pose
          ch.rotation.x = 0;
          ud.lA.rotation.z = Math.PI / 8;
          ud.rA.rotation.z = -Math.PI / 8;
          ud.lA.rotation.x = 0; ud.rA.rotation.x = 0;
        }

        // Eureka override animation — arms raised!
        if (ud.eurekaTime > 0) {
          ud.eurekaTime -= dt;
          ch.position.y = Math.abs(Math.sin(now * 0.015)) * 0.12;
          ud.lA.rotation.z = Math.PI / 2 + Math.sin(now * 0.02) * 0.3;

          ud.lA.rotation.x = -0.5; ud.rA.rotation.x = -0.5;
        }

        // Frustration override animation — fist shake

          ud.tp.set(

    // Create a speech bubble for an NPC
    function createSpeechBubble(npc, text, className) {
      const cls = className || 'speech-bubble';
      const div = document.createElement('div');
      div.className = cls;
      if (cls === 'speech-bubble') {

    // Update a speech bubble's screen position based on an NPC's 3D position
    function updateBubblePosition(bubble, npc) {
      if (!bubble || !npc) return;
      const pos = npc.position.clone();
      pos.y += 2.2;
      pos.project(camera);
      const x = (pos.x * 0.5 + 0.5) * innerWidth;
      const y = (-pos.y * 0.5 + 0.5) * innerHeight;
      bubble.style.left = x + 'px';
      bubble.style.top = y + 'px';
      // Hide if behind camera
      if (pos.z > 1) { bubble.style.display = 'none'; } else { bubble.style.display = ''; }
    }

    // Remove a bubble with fade-out
    function removeBubble(bubble) {
      if (!bubble) return;
      bubble.style.animation = 'bubbleOut 0.3s ease-in forwards';
      setTimeout(() => bubble.remove(), 300);
    }

    // Find two nearby idle NPCs for a conversation
    function findChatPair() {
      const idle = chars.filter(ch => {
        const ud = ch.userData;
        return !ud.dancing && ch !== curChar && !ud.inConvo;
      });
      if (idle.length < 2) return null;

      // Shuffle and pick the first pair within distance 10
      const shuffled = [...idle].sort(() => Math.random() - 0.5);
      for (let i = 0; i < shuffled.length; i++) {
        for (let j = i + 1; j < shuffled.length; j++) {
          const dist = shuffled[i].position.distanceTo(shuffled[j].position);
          if (dist < 10) {
            return [shuffled[i], shuffled[j]];
          }
        }
      }
      return null;
    }

    // Generate NPC-to-NPC conversation line via LLM
    async function generateNpcLine(speaker, listener, topic, previousLine) {
      const userMsg = previousLine
        ? `Your labmate ${listener.userData.name} just said: "${previousLine}". Reply with ONE short casual sentence (under 20 words). Be witty and in-character. No quotes, no action descriptions, just the spoken words.`
        : `You just walked up to ${listener.userData.name} and want to chat about ${topic}. Say ONE short casual sentence (under 20 words) to start the conversation. No quotes, no action descriptions, just the spoken words.`;
      const messages = [
        { role: 'system', content: `You are ${speaker.userData.name}, a ${speaker.userData.role}. ${speaker.userData.p}.` },
        { role: 'user', content: userMsg }
      ];
      try {
        const stream = await callOpenRouter(messages);
        let reply = '';
        await readSSEStream(stream, token => { reply += token; });
        reply = reply.replace(/<think>[\s\S]*?<\/think>/g, '').trim();
        reply = reply.replace(/^["']|["']$/g, '').trim();
        return reply || null;
      } catch (e) {
        console.error('NPC chat error:', e);
        return null;
      }
    }

    // Main NPC conversation tick — called every frame
    async function tickNpcChat(dt) {
      const st = npcChatState;

      if (st.phase === 'idle') {
        st.timer -= dt;
        if (st.timer <= 0) {
          const pair = findChatPair();
          if (pair) {
            st.pairA = pair[0];
            st.pairB = pair[1];
            st.pairA.userData.inConvo = true;
            st.pairB.userData.inConvo = true;
            st.pairA.userData.idleAnim = 'chatting';
            st.pairB.userData.idleAnim = 'chatting';
            st.phase = 'approaching';
            st.turnIndex = 0;
            st.maxTurns = 2 + Math.floor(Math.random() * 3); // 2-4 turns
            st.topic = labTopics[Math.floor(Math.random() * labTopics.length)];
            st.lastLine = '';
          }
          st.timer = 25 + Math.random() * 35;
        }
        return;
      }

      if (st.phase === 'approaching') {
        // Move NPCs toward each other
        const midpoint = st.pairA.position.clone().add(st.pairB.position).multiplyScalar(0.5);
        const dirA = midpoint.clone().sub(st.pairA.position); dirA.y = 0;
        const dirB = midpoint.clone().sub(st.pairB.position); dirB.y = 0;

        const distA = dirA.length();
        const distB = dirB.length();

        if (distA > 1.5) {
          dirA.normalize();
          st.pairA.position.addScaledVector(dirA, 0.02);
          st.pairA.lookAt(st.pairB.position);
          st.pairA.rotation.x = 0; st.pairA.rotation.z = 0;
        }
        if (distB > 1.5) {
          dirB.normalize();
          st.pairB.position.addScaledVector(dirB, 0.02);
          st.pairB.lookAt(st.pairA.position);
          st.pairB.rotation.x = 0; st.pairB.rotation.z = 0;
        }

        if (distA <= 1.5 && distB <= 1.5) {
          // Face each other
          st.pairA.lookAt(st.pairB.position);
          st.pairA.rotation.x = 0; st.pairA.rotation.z = 0;
          st.pairB.lookAt(st.pairA.position);
          st.pairB.rotation.x = 0; st.pairB.rotation.z = 0;
          st.phase = 'talking';
          // Start first turn
          doNpcTurn();
        }
        return;
      }

      if (st.phase === 'cooldown') {
        st.cooldown -= dt;
        // Keep facing each other during cooldown
        if (st.pairA && st.pairB) {
          st.pairA.lookAt(st.pairB.position);
          st.pairA.rotation.x = 0; st.pairA.rotation.z = 0;
          st.pairB.lookAt(st.pairA.position);
          st.pairB.rotation.x = 0; st.pairB.rotation.z = 0;
        }
        if (st.cooldown <= 0) {
          endNpcConvo();
        }
      }
    }

    async function doNpcTurn() {
      const st = npcChatState;
      if (st.turnIndex >= st.maxTurns) {
        // End conversation after a small pause
        st.phase = 'cooldown';
        st.cooldown = 3;
        return;
      }

      const speaker = st.turnIndex % 2 === 0 ? st.pairA : st.pairB;
      const listener = st.turnIndex % 2 === 0 ? st.pairB : st.pairA;

      // Show typing indicator
      const typingBubble = createSpeechBubble(speaker, '...', 'speech-bubble');
      if (st.turnIndex % 2 === 0) {
        removeBubble(st.bubbleA);
        st.bubbleA = typingBubble;
      } else {
        removeBubble(st.bubbleB);
        st.bubbleB = typingBubble;
      }

      const line = await generateNpcLine(speaker, listener, st.topic, st.lastLine);

      if (line) {
        // Replace typing bubble with actual line
        removeBubble(typingBubble);
        const bubble = createSpeechBubble(speaker, line, 'speech-bubble');
        if (st.turnIndex % 2 === 0) {
          st.bubbleA = bubble;
        } else {
          st.bubbleB = bubble;
        }

        st.lastLine = line;
        st.turnIndex++;

        // Emote occasionally
        if (Math.random() < 0.3) {
          floatTxt(['haha', '😂', '🤔', 'hmm', '!', '💡'][Math.floor(Math.random() * 6)], speaker.position);
        }

        // Wait before next turn
        setTimeout(() => {
          if (st.phase === 'talking') {
            doNpcTurn();
          }
        }, 4000 + Math.random() * 3000);
      } else {
        // LLM failed, end convo gracefully
        removeBubble(typingBubble);
        st.phase = 'cooldown';
        st.cooldown = 1;
      }
    }

    function endNpcConvo() {
      const st = npcChatState;
      removeBubble(st.bubbleA);
      removeBubble(st.bubbleB);
      st.bubbleA = null;
      st.bubbleB = null;
      if (st.pairA) {
        st.pairA.userData.inConvo = false;
        st.pairA.userData.idleAnim = 'walk';
        st.pairA.userData.idleTimer = 0;
      }
      if (st.pairB) {
        st.pairB.userData.inConvo = false;
        st.pairB.userData.idleAnim = 'walk';
        st.pairB.userData.idleTimer = 0;
      }
      // Random chance of post-convo emote
      if (Math.random() < 0.4 && st.pairA) {
        floatTxt(['good chat!', '📝', 'noted.', 'huh.', 'interesting...'][Math.floor(Math.random() * 5)], st.pairA.position);
      }
      st.pairA = null;
      st.pairB = null;
      st.phase = 'idle';
      st.timer = 25 + Math.random() * 35;
    }

    // ── Enhanced Random Behaviors ─────────────────────────────────────────────

    // Self-talk: random mumble bubbles
    let selfTalkTimer = 8 + Math.random() * 15;
    const activeMumbles = [];

    function tickSelfTalk(dt) {
      selfTalkTimer -= dt;
      if (selfTalkTimer <= 0) {
        selfTalkTimer = 12 + Math.random() * 20;
        // Pick a random idle NPC
        const idle = chars.filter(ch => !ch.userData.dancing && ch !== curChar && !ch.userData.inConvo);
        if (idle.length === 0) return;
        const npc = idle[Math.floor(Math.random() * idle.length)];
        const line = selfTalkLines[Math.floor(Math.random() * selfTalkLines.length)];
        const bubble = createSpeechBubble(npc, line, 'mumble-bubble');
        activeMumbles.push({ bubble, npc, life: 4 });
      }

      // Update and cleanup mumbles
      for (let i = activeMumbles.length - 1; i >= 0; i--) {
        const m = activeMumbles[i];
        m.life -= dt;
        updateBubblePosition(m.bubble, m.npc);
        if (m.life <= 0) {
          removeBubble(m.bubble);
          activeMumbles.splice(i, 1);
        }
      }
    }

    // Eureka moments
    let eurekaTimer = 30 + Math.random() * 60;
    function tickEureka(dt) {
      eurekaTimer -= dt;
      if (eurekaTimer <= 0) {
        eurekaTimer = 40 + Math.random() * 80;
        const idle = chars.filter(ch => !ch.userData.dancing && ch !== curChar && !ch.userData.inConvo);
        if (idle.length === 0) return;
        const npc = idle[Math.floor(Math.random() * idle.length)];
        // Eureka animation
        npc.userData.eurekaTime = 2.5;
        const exclamations = ['CONVERGED!', 'IT WORKS!', 'R² = 0.99!', 'p < 0.001!', 'EUREKA!', 'SCF DONE!', 'FINALLY!'];
        floatTxt(exclamations[Math.floor(Math.random() * exclamations.length)], npc.position);
        floatTxt('🎉', npc.position);
      }
    }

    // Frustration moments
    let frustTimer = 20 + Math.random() * 40;
    function tickFrustration(dt) {
      frustTimer -= dt;
      if (frustTimer <= 0) {
        frustTimer = 25 + Math.random() * 50;
        const idle = chars.filter(ch => !ch.userData.dancing && ch !== curChar && !ch.userData.inConvo);
        if (idle.length === 0) return;
        const npc = idle[Math.floor(Math.random() * idle.length)];
        npc.userData.frustTime = 2.0;
        const frustWords = ['SEGFAULT!', '#@$%!', 'NOT AGAIN', 'WHY?!', 'OOM!', 'nan nan nan'];
        floatTxt(frustWords[Math.floor(Math.random() * frustWords.length)], npc.position);
      }
    }

    animate(0);
    window.addEventListener('resize', () => { camera.aspect = innerWidth / innerHeight; camera.updateProjectionMatrix(); renderer.setSize(innerWidth, innerHeight); });
  </script>
